version: "3.9"

# Coolify: o backend recebe o domínio via SERVICE_FQDN_BACKEND_8000
# (ex.: api.investiga.adv.rocketxsistemas.com.br)
# o frontend via SERVICE_FQDN_FRONTEND_3000
# (ex.: investiga.adv.rocketxsistemas.com.br)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investiga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-investiga}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investiga}"]
      interval: 5s
      timeout: 5s
      retries: 20

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_BACKEND_8000
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-investiga}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-investiga}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-investiga-docs}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    expose:
      - "8000"
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.investiga-backend.rule=Host(`api-adv-inv.rocketxsistemas.com.br`)
      - traefik.http.routers.investiga-backend.entrypoints=http
      - traefik.http.routers.investiga-backend.service=investiga-backend
      - traefik.http.services.investiga-backend.loadbalancer.server.port=8000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_FRONTEND_3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.investiga-frontend.rule=Host(`adv-inv.rocketxsistemas.com.br`)
      - traefik.http.routers.investiga-frontend.entrypoints=http
      - traefik.http.routers.investiga-frontend.service=investiga-frontend
      - traefik.http.services.investiga-frontend.loadbalancer.server.port=3000
    depends_on:
      - backend

networks:
  default:
  coolify:
    external: true

volumes:
  postgres_data:
  chroma_data:
  minio_data:
